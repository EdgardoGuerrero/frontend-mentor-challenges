<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <div class="profile-container">
        <img
          src="./assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall"
          class="profile-img"
        />
        <h1 class="profile-name">Jessica Randall</h1>
        <p class="profile-ubication">London, United Kingdom</p>
        <p class="profile-description">
          "Front-end developer and avid reader."
        </p>

        <div class="profile-links">
          <a href="#" class="profile-link">Github</a>
          <a href="#" class="profile-link">Frontend Mentor</a>
          <a href="#" class="profile-link">LinkedIn</a>
          <a href="#" class="profile-link">Twitter</a>
          <a href="#" class="profile-link">Instagram</a>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://www.frontendmentor.io?ref=challenge"
        >Frontend Mentor</a
      >. Coded by
      <a
        target="_blank"
        rel="noopener noreferrer"
        href="https://github.com/EdgardoGuerrero"
        >Edgardo Guerrero</a
      >.
    </footer>
  </body>
</html>
